# ============================================
# Nginx -- Disneydle
# ============================================
# - HTTP :80 → redirige vers HTTPS :443
# - HTTPS :443 → sert le frontend + reverse proxy /api/
# - Certificats : Let's Encrypt (prod) ou auto-signe (dev local)
# - Securite headers, gzip, cache assets
# ============================================

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    server_name _;

    # Certbot challenge (renouvellement auto)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # --- Certificats SSL ---
    # Dev local  : ./ssl/fullchain.pem et ./ssl/privkey.pem (auto-signe)
    # Production : /etc/letsencrypt/live/<domaine>/ (Certbot)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # --- Parametres SSL ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- HSTS (force HTTPS pendant 1 an) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Frontend Vue SPA ---
    root /usr/share/nginx/html;
    index index.html;

    # --- Securite headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # --- Reverse proxy API → backend ---
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # --- Admin Django ---
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Static Django (admin CSS/JS) ---
    location /static/ {
        proxy_pass http://backend:8000/static/;
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Cache assets statiques (30 jours) ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
